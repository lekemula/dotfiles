# mise global configuration
# This file is symlinked to ~/.config/mise/config.toml

[tools]
# Default global tool versions
# Override these per-project with .mise.toml or .tool-versions
node = "lts"
ruby = "3.4"  # Latest 3.4.x version

[settings]
# Automatically install tools when entering a directory with .mise.toml/.tool-versions
auto_install = true

# Legacy version file support (asdf, nvm, etc.)
legacy_version_file = true

# Always keep downloaded tool versions
always_keep_download = false
idiomatic_version_file_enable_tools = ["ruby", "node"]

[settings.ruby]
compile = false
